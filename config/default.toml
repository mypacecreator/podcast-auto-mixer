# podmix default configuration.
# All ``*_ms`` values are integer milliseconds; gain values are in dB;
# ``output_bitrate`` is the MP3 bitrate string passed to ffmpeg.

[paths]
# Default audio file paths (can be overridden by CLI arguments)
default_bgm = "audio/bgm/bgm_main.wav"
default_outro = "audio/outro/bgm_end.wav"

[mix]
voice_start_ms = 1500
outro_tail_ms = 3000
bgm_outro_crossfade_ms = 2000

# Volume adjustments (dB): 0 = original, negative = quieter, positive = louder
voice_gain_db = 3.0
bgm_gain_db = -20.0
outro_gain_db = -17.0

[output]
sample_rate = 48000
channels = 2
output_bitrate = "192k"

name: Claude PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout entire repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # PR の差分ファイルまで取得する

      - name: Run Claude Code Review
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review the PR changes. Focus on code quality, potential bugs, performance, and suggest improvements.
            Write the entire review in Japanese.
            If no issues are found, post a short explicit comment saying "問題は見つかりませんでした".
#          claude_args: "--max-turns 5"
